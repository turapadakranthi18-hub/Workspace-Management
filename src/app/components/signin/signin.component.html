<div class="auth-wrapper">
  <div class="auth-card">
    <!-- Logo -->
    <div class="auth-logo">
      <div class="auth-logo-icon">
        <i class="ti ti-home-2"></i>
      </div>
      <h1 class="auth-brand">WorkSphere</h1>
      <p class="auth-tagline">Enterprise HR &amp; Productivity Portal</p>
    </div>

    <!-- Sign in / Sign up tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active">Sign in</button>
      <button class="auth-tab" routerLink="/signup">Sign up</button>
    </div>


    <!-- Form -->
    <form class="auth-form" [formGroup]="signinform" (ngSubmit)="onSubmit()">  
  
      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <input
          id="email"
          type="email"
          class="form-input"
          placeholder="you@company.com"
          formControlName="email"
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input
          id="password"
          type="password"
          class="form-input"
          placeholder="Enter your password"
          formControlName="password"
        />
        
      </div>

      <button type="submit" class="submit-btn">Sign in to WorkSphere</button>

      <p class="auth-footer">
        Forgot password? <a href="javascript:void(0)">Reset it</a>
      </p>
    </form>
  </div>
</div>
