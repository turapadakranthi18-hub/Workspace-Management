<div class="auth-wrapper">
  <div class="auth-card">
 
    <!-- Logo -->
    <div class="auth-logo">
      <div class="auth-logo-icon">
        <i class="ti ti-home-2"></i>
      </div>
      <h1 class="auth-brand">WorkSphere</h1>
      <p class="auth-tagline">Enterprise HR &amp; Productivity Portal</p>
    </div>
 
    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab" routerLink="/signin">Sign in</button>
      <button class="auth-tab active">Sign up</button>
    </div>
 
    <!-- Form -->
    <form class="auth-form" [formGroup]="signupForm" (ngSubmit)="onSubmit()">
 
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="name">Full Name</label>
          <input
            id="name"
            type="text"
            class="form-input"
            placeholder="Arjun Sharma"
            formControlName="fullName"
          />
        </div>
 
        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <input
            id="email"
            type="email"
            class="form-input"
            placeholder="you@company.com"
            formControlName="email"
          />
        </div>
      </div>
 
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input
            id="password"
            type="password"
            class="form-input"
            placeholder="Min 8 characters"
            formControlName="password"
          />
        </div>
 
        <div class="form-group">
          <label class="form-label" for="dept">Department</label>
          <input
            id="dept"
            type="text"
            class="form-input"
            placeholder="Engineering"
            formControlName="department"
          />
        </div>
      </div>
 
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="position">Position</label>
          <input
            id="position"
            type="text"
            class="form-input"
            placeholder="Software Engineer"
            formControlName="position"
          />
        </div>
 
        <div class="form-group">
          <label class="form-label" for="office">Office Location</label>
          <input
            id="office"
            type="text"
            class="form-input"
            placeholder="Hyderabad"
            formControlName="officeLocation"
          />
        </div>
      </div>
 
      <button type="submit" class="submit-btn">
        Create Account
      </button>
 
      <p class="auth-footer">
        Already have an account?
        <a routerLink="/signin">Sign in</a>
      </p>
 
    </form>
 
  </div>
</div>
